# 4. ETAPA DE BUILD: Usando la imagen oficial de Podman
build_with_podman:
  stage: build
  image: registry.local:5443/oficial-images/quay.io/podman/stable:latest
  script:
    # 1. Login en Harbor (Podman usará los certificados montados por tu Runner)
    - echo "$REGISTRY_PASS" | podman login $REGISTRY -u "$REGISTRY_USER" --password-stdin

    - podman pull $IMAGE_NAME:latest || true
    # 2. Build de la imagen
    - podman build 
        --tls-verify=true 
        --cache-from $IMAGE_NAME
        -t $IMAGE_NAME:$IMAGE_TAG 
        -t $IMAGE_NAME:latest 
        -f Dockerfile .

    # 3. Push a Harbor
    - podman tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
    - podman push $IMAGE_NAME:latest


# 5. ETAPA_SCAN_IMAGE: Escaneo de la imagen Docker con Trivy
trivy_image_scan:
  stage: security-scan
  image:
    name: registry.local:5443/oficial-images/mikefarah/yq:latest
    entrypoint: [""]
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .trivycache/
  script:
    # 1. Autenticar Trivy en tu Harbor privado para que pueda descargar la imagen
    - export TRIVY_USERNAME="$REGISTRY_USER"
    - export TRIVY_PASSWORD="$REGISTRY_PASS"
    
    # 2. Descargar o actualizar la base de datos de vulnerabilidades (Trivy lo hace solo)
    # 3. Escanear la imagen. --exit-code 1 hará que el pipeline falle si encuentra vulnerabilidades CRITICAL
    - trivy image \
        --tls-verify=true \
        --exit-code 1 \
        --severity HIGH,CRITICAL \
        "$IMAGE_NAME:$IMAGE_TAG"
 

# 6. ETAPA DE DEPLOY: Modifica el TERCER repositorio (Infraestructura)
trigger_gitops_deploy:
  stage: deploy
  image: registry.local:5443/oficial-images/mikefarah/yq:latest # Imagen oficial de yq para editar YAML de forma segura
  script:
    # Configurar credenciales de Git del bot
    - git config --global user.email "yclicourt@gmail.com"
    - git config --global user.name "yoadev"
    
    # Clonar el repositorio donde tienes tu Helm Chart (my-stack)
    - git clone https://oauth2:$GITLAB_TOKEN@$REPO_CODE
    - cd tasks-k3s-argocd/my-stack
    
    # Modificar el tag del backend en el values.yaml usando yq
    # Expresión: actualiza la propiedad .backend.tag con el valor del SHA corto de Git
    - yq -i ".backend_tasks_app.tag = \"${IMAGE_TAG}\"" values.yaml
    
    # Confirmar cambios y subirlos para que ArgoCD reaccione
    - git add values.yaml
    - git commit -m "chore(deploy):update django-backend helm tag to ${IMAGE_TAG} [skip ci]"
    - git push origin main