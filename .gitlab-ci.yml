stages:
  - lint
  - test
  # - security-sast
  - build
  - security-scan
  - deploy

variables:
  IMAGE_NAME: $REGISTRY/$REGISTRY_PROJECT/backend-django-tasks
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  TRIVY_CACHE_DIR: ".trivycache/"


# 1. ETAPA DE LINTING: Verificación de estilo de código
linting:
  stage: lint
  image: $REGISTRY/oficial-images/python:3.12-slim
  script:
    - pip install flake8
    - flake8 . --exclude=*.venv*,*migrations*

# 2. ETAPA DE TEST: Testing del backend con base de datos de testing
django_tests:
  stage: test
  image: $REGISTRY/oficial-images/python:3.12-slim
  services:
    - name: $REGISTRY/oficial-images/postgres:alpine
      alias: db
  variables:
    POSTGRES_DB: $POSTGRES_DB
    POSTGRES_USER: $POSTGRES_USER
    POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    DATABASE_URL: "postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@db:5432/$POSTGRES_DB"
  script:
    - pip install -r requirements.txt
    - python manage.py test


